    function Changecolor(){
        let inputValue=document.getElementById("inputData").value;

        let inputText=document.getElementById("text");

        inputText.innerHTML=inputValue;

        inputText.style.color="red";
        //random color

         inputText.style.backgroundColor="#"+Math.floor(Math.random()* 16777215).toString(16);

    }
     //change para color using addEventlistner method
     let para = document.getElementById('paragraph');
     function changeColor(){
        para.style.color='#'+Math.floor(Math.random() * 16777215).toString(16);
     }
       para.addEventListener("mouseover", changeColor);
