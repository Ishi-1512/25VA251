<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Introduction</title>
</head>
<body>
    <h2>Java Script</h2>
    <script>
        //js variable---- container that keeps either value or not
        //JavaScript variables are containers for storing data values and can be declared using the keywords var, let, or const. They are dynamically typed, meaning you don't need to specify the data type (like number or string) when declaring them, and the type can change during program execution
        
        //using var keyword
        var myName="ABES";
        document 
        //The document in JavaScript is a global object representing the entire web page and serves as the entry point for interacting with and manipulating its content, structure, and style. It is the root node of the Document Object Model (DOM) tree, which is a programming interface for HTML (and XML) documents
        document.write(myName);//output on browser
        console.log(myName);//output on console
        //Js execution and scope i Js(Global and Local[block])
        function hello(){
            var msg="Thanks To Visit";
            console.log(msg);//local or block
        }
        hello();
        //variable declaration using let and const

        let myRollno=202501010266;
        console.log(myRollno);

        myRollno=202501010265;// no redeclare but can reassigned
        console.log(myRollno);

        const myPhoneno=9389037970;
        console.log("My contact no is" + myPhoneno);

       // myPhoneno.=298490;  // no redeclare and no reassign
        console.log(myPhoneno);
        //The main differences between var, let, and const in JavaScript are their scope, whether they can be reassigned or re-declared, and their hoisting behavior


    </script>
</body>
</html>
